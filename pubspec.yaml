name: diary_app
description: 个人日记应用 - 古董笔记本风格
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.0
  path: ^1.8.0
  path_provider: ^2.1.0
  provider: ^6.1.0
  intl: ^0.19.0
  share_plus: ^10.0.0
  shared_preferences: ^2.2.0
  crypto: ^3.0.3
  flutter_staggered_grid_view: ^0.7.0
  image_picker: ^1.0.0
  record: ^7.0.0
  audioplayers: ^6.0.0
  geolocator: ^13.0.0
  http: ^1.2.0
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.0
  fl_chart: ^0.69.0
  archive: ^3.6.1
  file_selector: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon_new.png"
  adaptive_icon_background: "#FFF0E0"
  adaptive_icon_foreground: "assets/icon/app_icon_new.png"

flutter:
  uses-material-design: true

  assets:
    - assets/backgrounds/
    - assets/decorations/

  fonts:
    - family: MaShanZheng
      fonts:
        - asset: assets/fonts/MaShanZheng-Regular.ttf
    - family: ZCOOLXiaoWei
      fonts:
        - asset: assets/fonts/ZCOOLXiaoWei-Regular.ttf
